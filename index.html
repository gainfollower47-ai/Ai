<!DOCTYPE html>      
<html lang="en">      
<head>      
  <meta charset="UTF-8" />      
  <title>PhotoMotion AI</title>      
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />      
      
  <style>      
    body {      
      margin: 0;      
      font-family: Arial, sans-serif;      
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);      
      color: white;      
      text-align: center;      
    }      
      
    .container {      
      padding: 20px;      
      max-width: 600px;      
      margin: auto;      
    }      
      
    input, textarea {      
      width: 90%;      
      padding: 12px;      
      margin: 10px 0;      
      border-radius: 10px;      
      border: none;      
    }      
      
    button {      
      padding: 12px 20px;      
      border-radius: 20px;      
      border: none;      
      background: white;      
      color: #0284c7;      
      font-weight: bold;      
      cursor: pointer;      
    }      
      
    img, video {      
      width: 100%;      
      border-radius: 12px;      
      margin-top: 10px;      
    }      
      
    .hidden {      
      display: none;      
    }      
      
    .loader {      
      border: 5px solid rgba(255,255,255,0.3);      
      border-top: 5px solid white;      
      border-radius: 50%;      
      width: 50px;      
      height: 50px;      
      margin: 20px auto;      
      animation: spin 1s linear infinite;      
    }      
      
    @keyframes spin {      
      0% { transform: rotate(0deg); }      
      100% { transform: rotate(360deg); }      
    }      
  </style>      
</head>      
      
<body>      
      
<div id="home" class="container">      
  <h1>🎬 PhotoMotion AI</h1>      
      
  <input type="file" id="imageInput" accept="image/*" />      
  <img id="preview" class="hidden" />      
      
  <textarea id="prompt" placeholder="Describe your video..."></textarea>      
      
  <button onclick="generate()">✨ Generate Video</button>      
</div>      
      
<div id="processing" class="container hidden">      
  <h2>Processing... ✨</h2>      
  <div class="loader"></div>      
</div>      
      
<div id="output" class="container hidden">      
  <h2>Your Video 🎥</h2>      
  <video id="video" controls autoplay loop></video>      
</div>      
      
<script>      
  let imageFile = null;      
      
  const home = document.getElementById("home");      
  const processing = document.getElementById("processing");      
  const output = document.getElementById("output");      
      
  document.getElementById("imageInput").onchange = function(e) {      
    const file = e.target.files[0];      
    if (file) {      
      imageFile = file;      
      const preview = document.getElementById("preview");      
      preview.src = URL.createObjectURL(file);      
      preview.classList.remove("hidden");      
    }      
  };      
      
  async function generate() {      
    const prompt = document.getElementById("prompt").value;      
      
    if (!imageFile || !prompt) {      
      alert("Upload image & enter prompt");      
      return;      
    }      
      
    home.classList.add("hidden");      
    processing.classList.remove("hidden");      
      
    try {      
      const formData = new FormData();      
      formData.append("image", imageFile);      
      formData.append("prompt", prompt);      
      
      const res = await fetch("https://photo-backend-8wcc.onrender.com/generate", {      
        method: "POST",      
        body: formData      
      });      
      
      const data = await res.json();      
      
      processing.classList.add("hidden");      
      output.classList.remove("hidden");      
      
      document.getElementById("video").src = data.video_url;      
      
    } catch (err) {      
      alert("Error connecting to backend 😢");      
      console.error(err);      
    }      
  }      
</script>      
      
</body>      
</html>
